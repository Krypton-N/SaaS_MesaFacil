<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MesaFácil - Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeeee",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f1f1f1",
                        "background": "#f9f9f9",
                        "surface-tint": "#a04100",
                        "primary-fixed": "#ffdbcc",
                        "on-background": "#1a1c1c",
                        "secondary": "#5f5e5e",
                        "on-secondary-fixed-variant": "#474746",
                        "on-primary-fixed-variant": "#7a3000",
                        "inverse-primary": "#ffb693",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "inverse-surface": "#2f3131",
                        "outline-variant": "#e2bfb0",
                        "on-tertiary-container": "#581f00",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary-fixed": "#360f00",
                        "on-surface": "#1a1c1c",
                        "tertiary-fixed-dim": "#ffb595",
                        "surface-container-high": "#e8e8e8",
                        "on-primary-container": "#572000",
                        "tertiary-container": "#fd6c19",
                        "on-surface-variant": "#5a4136",
                        "primary-container": "#ff6b00",
                        "surface-variant": "#e2e2e2",
                        "primary": "#a04100",
                        "on-secondary-container": "#636262",
                        "tertiary": "#a23f00",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-fixed": "#351000",
                        "surface": "#f9f9f9",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffb693",
                        "surface-bright": "#f9f9f9",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#e5e2e1",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#c8c6c5",
                        "tertiary-fixed": "#ffdbcd",
                        "outline": "#8e7164",
                        "surface-dim": "#dadada",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#e2dfde"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "container-padding": "20px",
                        "xl": "32px",
                        "xs": "4px",
                        "touch-target-min": "48px",
                        "sm": "12px",
                        "lg": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h3": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "h1": ["Plus Jakarta Sans"],
                        "button": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-container-padding antialiased">
<!-- Decorative ambient background blobs for "Tactile" edge -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -right-[5%] w-[40vw] h-[40vw] rounded-full bg-primary-fixed/20 blur-3xl mix-blend-multiply"></div>
<div class="absolute top-[60%] -left-[10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container/30 blur-3xl mix-blend-multiply"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(26,26,26,0.08)] border border-outline-variant/20 p-xl relative z-10 flex flex-col gap-lg">
<!-- Header / Logo -->
<div class="flex flex-col items-center justify-center text-center pb-sm border-b border-surface-variant">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-[28px] text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h1 class="font-h2 text-h2 text-primary tracking-tight">MesaFácil</h1>
<p class="font-body-md text-body-md text-secondary mt-xs">Restaurant Administration</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-xs" for="email">Correo electrónico</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-secondary">mail</span>
<input class="w-full h-touch-target-min pl-[48px] pr-md bg-surface-container-low text-on-surface font-body-md text-body-md rounded-lg border-2 border-transparent outline-none focus:border-primary focus:bg-surface-container-lowest transition-all placeholder:text-secondary-fixed-dim shadow-sm" id="email" name="email" placeholder="admin@mesafacil.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-xs" for="password">Contraseña</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-secondary">lock</span>
<input class="w-full h-touch-target-min pl-[48px] pr-md bg-surface-container-low text-on-surface font-body-md text-body-md rounded-lg border-2 border-transparent outline-none focus:border-primary focus:bg-surface-container-lowest transition-all placeholder:text-secondary-fixed-dim shadow-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-xs">
<a class="font-body-md text-body-md text-primary hover:text-tertiary transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min mt-sm bg-primary text-on-primary font-button text-button rounded-lg flex items-center justify-center shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] hover:bg-tertiary active:scale-[0.98] transition-all duration-200 gap-base" type="submit">
<span>Iniciar sesión</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Help Text -->
<div class="text-center mt-xs">
<p class="font-body-md text-body-md text-secondary text-sm">
                ¿Necesitas ayuda? <a class="text-primary hover:underline" href="#">Contacta a soporte</a>
</p>
</div>
</div>
</body></html>

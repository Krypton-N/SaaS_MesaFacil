<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col relative overflow-hidden">
<!-- Atmospheric Background Image -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-30" data-alt="A softly blurred, cinematic background of a high-end, modern restaurant interior. Warm, ambient lighting illuminates sleek wooden tables and elegant bar settings. The mood is sophisticated, welcoming, and professional, using a warm color palette with deep earthy tones and soft golden highlights. The composition is deliberately out of focus to serve as a subtle, premium backdrop for a digital interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC8deJumg8_T7LlOKBh_bmfAzvGRv81adkN0IAR1pKKzeR2fMoV8KuEv5mfKcBulItvKUVr_Fo32YYXiirUXpDGTAsJm3G5yia5jxbL7NU6h_OSHZGD80FPdO2JD3TQYYI00tyeX7WK38tJtb5YgYuV0zHUlAYtit_DWVHqPIaZaf-YaHfTP-3pxPwvyhxdYThoC1RGeoLVm75LqFqLecf3-504Y-9gBw_87I-1-jJapjseG-5cq2mLE21Ch21kYZ246-9J_OjHJKA');"></div>
<!-- Gradient Overlay for Contrast -->
<div class="absolute inset-0 z-0 bg-gradient-to-b from-surface-bright/80 to-surface/95 backdrop-blur-sm"></div>
<!-- Main Content Container -->
<main class="relative z-10 flex-1 flex flex-col justify-center items-center p-container-padding w-full max-w-md mx-auto">
<!-- Header / Logo -->
<div class="text-center mb-xl w-full">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary-container mb-sm shadow-sm ring-4 ring-surface-container-lowest">
<span class="material-symbols-outlined text-[32px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">MesaFácil</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Restaurant Administration</p>
</div>
<!-- Login Form Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-lg shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-surface-variant flex flex-col gap-lg">
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant pointer-events-none">mail</span>
<input class="w-full h-touch-target-min pl-12 pr-md rounded-xl bg-surface-container-low text-on-surface font-body-md text-body-md border border-outline/30 placeholder:text-outline focus:bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="admin@restaurant.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant pointer-events-none">lock</span>
<input class="w-full h-touch-target-min pl-12 pr-md rounded-xl bg-surface-container-low text-on-surface font-body-md text-body-md border border-outline/30 placeholder:text-outline focus:bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-xs mb-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-5 h-5 rounded border-outline/50 text-primary focus:ring-primary/20 bg-surface-container-low cursor-pointer transition-colors" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-md text-[14px] text-primary hover:text-tertiary-container font-semibold transition-colors" href="#">Recover access</a>
</div>
<!-- Primary Action Button -->
<button class="w-full h-touch-target-min rounded-xl bg-primary hover:bg-tertiary-container text-on-primary font-button text-button flex items-center justify-center gap-sm shadow-md shadow-primary/20 active:scale-[0.98] transition-all duration-200" type="submit">
                    Iniciar sesión
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer subtly integrated -->
<div class="mt-xl text-center">
<p class="font-body-md text-[13px] text-on-surface-variant/80">Secure administration portal powered by MesaFácil</p>
</div>
</main>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - MesaFácil</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#8e7164",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#581f00",
                        "tertiary-fixed-dim": "#ffb595",
                        "surface": "#f9f9f9",
                        "secondary-container": "#e2dfde",
                        "inverse-surface": "#2f3131",
                        "on-primary-container": "#572000",
                        "secondary": "#5f5e5e",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-background": "#1a1c1c",
                        "tertiary-container": "#fd6c19",
                        "on-surface-variant": "#5a4136",
                        "tertiary-fixed": "#ffdbcd",
                        "on-error": "#ffffff",
                        "tertiary": "#a23f00",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary-fixed": "#351000",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#7a3000",
                        "primary-container": "#ff6b00",
                        "outline-variant": "#e2bfb0",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#ffb693",
                        "surface-variant": "#e2e2e2",
                        "inverse-primary": "#ffb693",
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed": "#e5e2e1",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed": "#360f00",
                        "on-surface": "#1a1c1c",
                        "surface-container": "#eeeeee",
                        "primary-fixed": "#ffdbcc",
                        "on-primary": "#ffffff",
                        "background": "#f9f9f9",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-container": "#636262",
                        "primary": "#a04100",
                        "surface-tint": "#a04100"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        "touch-target-min": "48px",
                        "lg": "24px",
                        "sm": "12px",
                        "md": "16px",
                        "base": "8px",
                        "xl": "32px",
                        "container-padding": "20px",
                        "xs": "4px"
                    },
                    fontFamily: {
                        "label-caps": ["Inter"],
                        "h3": ["Plus Jakarta Sans"],
                        "button": ["Inter"],
                        "h1": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }],
                        "h3": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "button": ["16px", { lineHeight: "1", fontWeight: "600" }],
                        "h1": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "h2": ["24px", { lineHeight: "1.3", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-24 md:pb-0">
<!-- TopAppBar (Modified for Checkout - Transactional flow) -->
<header class="bg-white/90 dark:bg-neutral-900/90 backdrop-blur-md fixed top-0 w-full z-50 border-b border-neutral-100 dark:border-neutral-800 shadow-sm flex items-center justify-between px-5 h-16">
<button aria-label="Go back" class="text-neutral-500 hover:bg-neutral-50 dark:hover:bg-neutral-800 transition-colors active:scale-95 duration-200 p-2 -ml-2 rounded-full flex items-center justify-center min-h-[48px] min-w-[48px]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-extrabold tracking-tight text-neutral-900 dark:text-white font-['Plus_Jakarta_Sans']">Checkout</h1>
<div class="min-w-[48px]"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow pt-24 px-container-padding max-w-md mx-auto w-full">
<!-- Order Total Section -->
<section class="text-center mb-xl">
<p class="font-body-md text-secondary mb-xs">Total to pay</p>
<h2 class="font-h1 text-h1 text-on-background">$142.50</h2>
<p class="font-body-md text-on-surface-variant mt-sm">Table 12</p>
</section>
<!-- Payment Method Segmented Control (Optional, but adds realism) -->
<div class="bg-surface-container-high rounded-xl p-xs flex mb-lg">
<button class="flex-1 bg-surface shadow-sm rounded-lg py-sm font-button text-button text-primary-container text-center transition-all">Credit Card</button>
<button class="flex-1 rounded-lg py-sm font-button text-button text-secondary text-center hover:bg-surface-container-highest transition-all">Digital Wallet</button>
</div>
<!-- Secure Card Form -->
<section class="bg-surface rounded-[24px] shadow-[0_4px_24px_rgba(26,26,26,0.06)] p-lg border border-surface-container-high">
<form class="space-y-md">
<!-- Card Holder Name -->
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-xs" for="cardHolder">Cardholder Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-transparent rounded-xl px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors min-h-touch-target-min" id="cardHolder" placeholder="John Doe" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-secondary" data-icon="person">person</span>
</div>
</div>
<!-- Card Number -->
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-xs" for="cardNumber">Card Number</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-transparent rounded-xl px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors min-h-touch-target-min" id="cardNumber" placeholder="0000 0000 0000 0000" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-secondary" data-icon="credit_card">credit_card</span>
</div>
</div>
<!-- Expiry & CVV Row -->
<div class="flex gap-md">
<div class="flex-1">
<label class="block font-label-caps text-label-caps text-secondary mb-xs" for="expiry">Expiry</label>
<input class="w-full bg-surface-container-low border border-transparent rounded-xl px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors min-h-touch-target-min" id="expiry" placeholder="MM/YY" type="text"/>
</div>
<div class="flex-1">
<label class="block font-label-caps text-label-caps text-secondary mb-xs" for="cvv">CVV</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-transparent rounded-xl px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors min-h-touch-target-min" id="cvv" placeholder="123" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-secondary text-[20px]" data-icon="info">info</span>
</div>
</div>
</div>
<!-- Save Card Toggle (Optional detail) -->
<div class="flex items-center mt-md pt-sm border-t border-surface-container-high">
<input class="w-5 h-5 rounded text-primary-container border-surface-variant focus:ring-primary-container bg-surface-container-low mr-sm" id="saveCard" type="checkbox"/>
<label class="font-body-md text-body-md text-secondary" for="saveCard">Save card for future orders</label>
</div>
</form>
</section>
<!-- Trust Indicators & CTA Area -->
<section class="mt-xl text-center">
<button class="w-full bg-primary-container text-on-primary font-button text-button rounded-full min-h-touch-target-min py-sm px-lg shadow-[0_4px_12px_rgba(255,107,0,0.25)] hover:bg-[#E56000] active:scale-[0.98] transition-all flex items-center justify-center gap-sm mb-lg">
<span class="material-symbols-outlined" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
                Confirm Payment
            </button>
<div class="flex items-center justify-center gap-xs text-secondary opacity-80">
<span class="material-symbols-outlined text-[16px]" data-icon="shield">shield</span>
<span class="font-body-md text-[14px]">Payment secured by OpenPay</span>
</div>
</section>
</main>
<!-- Navigation Suppressed for Transactional Flow (Checkout) -->
</body></html>
